packages:
  - '.'
  - 'packages/*'

# Allow native postinstall scripts (else pnpm 10 ignores them → sharp/optimize-assets
# + workerd/wrangler-dev silently broken).
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
  - unrs-resolver

catalog:
  astro: ^6.4.4
  vite: ^7.3.2
  typescript: ^5.7.0
  '@astrojs/check': ^0.9.9
  '@astrojs/sitemap': ^3.7.2
  '@astrojs/cloudflare': ^13.6.1
  vitest: ^4.1.8
  '@types/google-publisher-tag': 1.20260525.0
  yaml: ^2.8.3
  marked: ^18.0.3
  zod: ^4.4.1
  sharp: ^0.34.5
  svgo: ^4.0.1
  wrangler: ^4.97.0
  '@cloudflare/workers-types': ^4.20251101.0
  esbuild: ^0.25.0
  '@types/node': ^22.10.5
  web-vitals: ^5.0.4
